wafs:
  - name: cloudflare
    headers_any: ["cf-ray", "cf-cache-status", "cloudflare", "server:\s*cloudflare"]
    cookies_any: ["__cf_bm", "cf_chl_", "cf_clearance"]
    body_regex: ["Attention Required!\s*\|\s*Cloudflare", "Please enable JavaScript"]
    status_any: [403, 503]
    challenge_signals: ["cf-chl-", "cf_ray"]
    notes: "Cloudflare IUAM/JS challenge"
    safe_rps: 0.5
    backoff_ms: 3000
    header_camo: true
    rotate_ua: true
    reduce_inline_handlers: true
    no_javascript_url: true
  - name: akamai
    headers_any: ["akamai", "x-akamai-", "server: AkamaiGHost"]
    cookies_any: ["ak_bmsc", "abck"]
    status_any: [403, 400]
    notes: "Akamai Bot Manager/Edge"
    safe_rps: 1.0
    header_camo: true
    reduce_inline_handlers: true
  - name: imperva
    headers_any: ["x-iinfo", "x-cdn"]
    cookies_any: ["visid_incap", "nlbi"]
    body_regex: ["Request\s+blocked", "Incapsula"]
    status_any: [403]
    notes: "Imperva/Incapsula"
    safe_rps: 0.8
    header_camo: true
    reduce_inline_handlers: true
    no_javascript_url: true
  - name: aws_waf
    headers_any: ["x-amzn-RequestId", "x-amzn-ErrorType", "x-amz-"]
    body_regex: ["Request\s+blocked"]
    status_any: [403]
    notes: "AWS WAF"
    safe_rps: 1.0
    reduce_inline_handlers: true
    no_javascript_url: true
  - name: azure_waf
    headers_any: ["x-azure-ref", "x-ms-request-id"]
    status_any: [403]
    notes: "Azure Front Door/WAF"
    safe_rps: 1.2
  - name: bigip_asm
    headers_any: ["big-ip", "x-wa-info", "x-asm-version"]
    cookies_any: ["BIGipServer"]
    status_any: [403]
    notes: "F5 BIG-IP ASM"
    header_camo: true
  - name: barracuda
    headers_any: ["barracuda", "bn-reqid"]
    status_any: [403]
    notes: "Barracuda WAF"
    header_camo: true
  - name: cloudfront
    headers_any: ["via:\s*1\.1\s*.*cloudfront", "x-amz-cf-", "server:\s*cloudfront", "x-cache:\s*.*cloudfront"]
    body_regex: ["CloudFront", "The request could not be satisfied", "Generated by cloudfront"]
    notes: "CloudFront/Shield"
    safe_rps: 1.0
    trust_proxy: true
  - name: modsecurity
    body_regex: ["access\s+denied\s+by\s+modsecurity", "mod_security"]
    status_any: [403]
    notes: "ModSecurity/OWASP CRS"
    reduce_inline_handlers: true
  - name: sucuri
    headers_any: ["x-sucuri-id", "server: Sucuri/Cloudproxy"]
    body_regex: ["Sucuri WebSite Firewall"]
    status_any: [403]
    notes: "Sucuri"
    safe_rps: 0.9
  - name: stackpath
    headers_any: ["server: StackPath"]
    status_any: [403, 406]
    notes: "StackPath"
    header_camo: true
  - name: fastly
    headers_any: ["via: .*fastly", "x-served-by", "x-cache"]
    notes: "Fastly"
    trust_proxy: true
  - name: naxsi
    headers_any: ["x-naxsi-verbose"]
    body_regex: ["NAXSI"]
    notes: "NAXSI"
  - name: sophos
    headers_any: ["sophos"]
    notes: "Sophos UTM"
